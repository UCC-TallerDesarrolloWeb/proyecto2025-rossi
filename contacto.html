<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="author" content="Lorenzo Rossi Bossio"><meta name="description" content="Formulario de contacto de Burger House."><meta name="keywords" content="contacto, Burger House, mensaje"><title>Burger House | Contacto</title><link rel="icon" href="imagenes/favicon.ico"><link rel="stylesheet" href="css/estilos.css"><script src="js/funciones.js" defer></script></head><body>
<header class="cabecera"><div class="cabecera-contenido"><a class="marca" href="index.html"><img src="imagenes/logo.png" alt="Logo de Burger House"><h1>Burger<br>House</h1></a><nav aria-label="Navegación principal"><ul><li><a href="index.html">Home</a></li><li><a href="menu.html">Menú</a></li><li><a href="sucursales.html">Sucursales</a></li><li><a href="contacto.html" aria-current="page">Contacto</a></li><li><a href="carrito.html">Carrito</a></li></ul></nav></div></header>
<main class="contenedor"><section aria-labelledby="titulo-contacto"><h2 class="titulo-seccion" id="titulo-contacto">Contacto</h2><p class="intro-contacto">¡Nos encanta saber de vos! Dejanos tu mensaje y te responderemos a la brevedad.</p><form class="formulario-contacto" onsubmit="validarFormulario(event)" novalidate><div class="grupo-campo"><label for="nombre">Nombre</label><input id="nombre" name="nombre" type="text" placeholder="Tu nombre" size="40" maxlength="40"></div><div class="grupo-campo"><label for="apellido">Apellido</label><input id="apellido" name="apellido" type="text" placeholder="Tu apellido" size="40" maxlength="40"></div><div class="grupo-campo"><label for="telefono">Teléfono</label><input id="telefono" name="telefono" type="tel" placeholder="Ej: 11 1234 5678" size="30" maxlength="25"></div><div class="grupo-campo"><label for="correo">Correo electrónico</label><input id="correo" name="correo" type="email" placeholder="tu@email.com" required></div><div class="grupo-campo"><label for="mensaje">Mensaje</label><textarea id="mensaje" name="mensaje" placeholder="¿En qué podemos ayudarte?" maxlength="500"></textarea></div><button class="boton" type="submit">ENVIAR</button></form></section></main><footer class="pie"><p>© 2026 Burger House</p></footer></body></html>
