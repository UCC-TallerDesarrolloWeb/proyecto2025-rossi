<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Lorenzo Rossi Bossio">
        <meta name="description" content="Carrito de compras de Burger House.">
        <meta name="keywords" content="carrito, compra, Burger House">
        <title>Burger House | Carrito</title>
        <link rel="icon" href="imagenes/favicon.ico">
        <link rel="stylesheet" href="styles.css">
        <script src="funciones.js" defer></script>
    </head>
    <body onload="mostrarCarrito()">
        <header class="cabecera">
            <div class="cabecera-contenido">
                <a class="marca" href="index.html">
                    <img src="imagenes/logo.png" alt="Logo de Burger House">
                    <h1>Burger<br>House</h1>
                </a>
                <nav aria-label="Navegación principal">
                    <ul>
                        <li>
                            <a href="index.html">Home</a>
                        </li>
                        <li>
                            <a href="menu.html">Menú</a>
                        </li>
                        <li>
                            <a href="sucursales.html">Sucursales</a>
                        </li>
                        <li>
                            <a href="contacto.html">Contacto</a>
                        </li>
                        <li>
                            <a href="carrito.html" aria-current="page">Carrito</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </header>
        <main class="contenedor">
            <section aria-labelledby="titulo-carrito">
                <h2 class="titulo-seccion" id="titulo-carrito">Tu Carrito</h2>
                <div id="lista-carrito"></div>
                <div class="resumen-carrito">
                    <p id="total-carrito">Total de la compra: $0</p>
                    <button class="boton boton-peligro" id="vaciar-carrito" type="button" onclick="vaciarCarrito()">Vaciar carrito</button>
                </div>
            </section>
        </main>
        <footer class="pie">
            <p>© 2026 Burger House</p>
        </footer>
    </body>
</html>
